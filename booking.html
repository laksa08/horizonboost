<script type="module">

// 🔥 Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔑 YOUR CONFIG (already filled in)
const firebaseConfig = {
  apiKey: "AIzaSyCsFshu5jFYa5rkdE9YBaRZSygBhN0rHXQ",
  authDomain: "horizonboost-536ed.firebaseapp.com",
  projectId: "horizonboost-536ed",
  storageBucket: "horizonboost-536ed.firebasestorage.app",
  messagingSenderId: "483833292439",
  appId: "1:483833292439:web:aa633917567ac651c9ebd2",
  measurementId: "G-0E2YCF5CZR"
};

// 🔥 Initialize
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedTime = "";

const times = [
"9:00 AM","9:45 AM","10:30 AM","11:15 AM",
"12:00 PM","12:45 PM","1:30 PM","2:15 PM",
"3:00 PM","3:45 PM","4:30 PM","5:15 PM"
];

const slots = document.getElementById("slots");

// 🔄 LOAD BOOKINGS + BLOCK TIMES
async function loadBookings(){

const selectedDate = document.getElementById("date").value;

const querySnapshot = await getDocs(collection(db, "bookings"));

let bookedTimes = [];

querySnapshot.forEach(doc=>{
let data = doc.data();
if(data.date === selectedDate){
bookedTimes.push(data.time);
}
});

slots.innerHTML = "";

times.forEach(t=>{

let div = document.createElement("div");
div.className = "slot";
div.innerText = t;

// 🚫 Block booked times
if(bookedTimes.includes(t)){
div.style.background = "#ccc";
div.style.cursor = "not-allowed";
div.innerText = t + " (Booked)";
}else{
div.onclick = ()=>{
selectedTime = t;
document.getElementById("form").style.display="block";
document.getElementById("timeInput").value = t;
}
}

slots.appendChild(div);

});

}

// 📅 When date changes
document.getElementById("date").addEventListener("change", ()=>{
document.getElementById("dateInput").value = document.getElementById("date").value;
loadBookings();
});

// 💾 Save booking to Firebase
document.querySelector("form").addEventListener("submit", async ()=>{

await addDoc(collection(db, "bookings"), {
date: document.getElementById("date").value,
time: selectedTime
});

});

</script>
