<!DOCTYPE html>
<html>
<head>
<title>Book a Call | HorizonBoost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#f6f7fb;
}

.navbar{
background:#0f172a;
padding:15px 30px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.wrapper{
max-width:900px;
margin:60px auto;
background:white;
display:flex;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.left{
width:40%;
background:#0f172a;
color:white;
padding:40px;
}

.right{
width:60%;
padding:40px;
}

.slot-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.slot{
border:1px solid #2563eb;
padding:12px;
text-align:center;
cursor:pointer;
border-radius:6px;
}

.slot:hover{
background:#2563eb;
color:white;
}

.form{
display:none;
margin-top:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1e40af;
}

</style>
</head>

<body>

<div class="navbar">
  <div style="color:white;font-weight:bold;">HorizonBoost</div>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Book a Call</a>
    <a href="dev-dashboard.html">Dev</a>
  </div>
</div>

<div class="wrapper">

<div class="left">
<h2>HorizonBoost</h2>
<h3>1:1 Strategy Call</h3>
<p>Duration: 45 Minutes</p>
<p>We’ll review your business and help you scale with proven strategies.</p>
</div>

<div class="right">

<h3>Select a Date</h3>
<input type="date" id="date">

<h3>Select a Time</h3>
<div class="slot-grid" id="slots"></div>

<div class="form" id="form">

<h3>Your Details</h3>

<form action="https://formspree.io/f/mzdkeegr" method="POST">

<input name="name" placeholder="Full Name" required>
<input name="business" placeholder="Business Name" required>
<input name="email" placeholder="Email Address" required>
<input name="phone" placeholder="Phone Number" required>

<input type="hidden" name="date" id="dateInput">
<input type="hidden" name="time" id="timeInput">

<button type="submit">Request Call</button>

</form>

</div>

</div>

</div>

<script>

let selectedTime=""

const times=[
"9:00 AM","9:45 AM","10:30 AM","11:15 AM",
"12:00 PM","12:45 PM","1:30 PM","2:15 PM",
"3:00 PM","3:45 PM","4:30 PM","5:15 PM"
]

const slots=document.getElementById("slots")

times.forEach(t=>{

let div=document.createElement("div")
div.className="slot"
div.innerText=t

div.onclick=()=>{
selectedTime=t
document.getElementById("form").style.display="block"
document.getElementById("timeInput").value=t
}

slots.appendChild(div)

})

document.getElementById("date").addEventListener("change", e=>{
document.getElementById("dateInput").value=e.target.value
})

</script>

</body>
</html>
