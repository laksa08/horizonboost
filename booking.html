<!DOCTYPE html>
<html>
<head>
<title>Book a Call | HorizonBoost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BACKGROUND */
body{
font-family:Arial;
margin:0;
background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
min-height:100vh;
}

/* 🔮 GLOW EFFECT */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background: radial-gradient(circle at 20% 30%, #2563eb, transparent 40%),
            radial-gradient(circle at 80% 70%, #9333ea, transparent 40%);
}

/* 🔝 NAVBAR */
.navbar{
background:rgba(15,23,42,0.8);
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
backdrop-filter: blur(10px);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.logo{
color:white;
font-size:18px;
font-weight:bold;
}

/* 📦 MAIN BOX */
.wrapper{
max-width:900px;
margin:60px auto;
background:white;
display:flex;
border-radius:12px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* LEFT PANEL */
.left{
width:40%;
background:#0f172a;
color:white;
padding:40px;
}

/* RIGHT PANEL */
.right{
width:60%;
padding:40px;
}

/* TIME SLOTS */
.slot-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:10px;
}

.slot{
border:1px solid #2563eb;
padding:12px;
text-align:center;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.slot:hover{
background:#2563eb;
color:white;
transform:translateY(-2px);
}

/* FORM */
.form{
display:none;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* BUTTON */
button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#1e40af;
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* 📱 MOBILE */
@media(max-width:800px){
.wrapper{
flex-direction:column;
}
.left,.right{
width:100%;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
  <div class="logo">HorizonBoost</div>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Book a Call</a>
    <a href="dev-dashboard.html">Dev</a>
  </div>
</div>

<div class="wrapper">

<div class="left">
<h2>HorizonBoost</h2>
<h3>1:1 Strategy Call</h3>
<p><b>Duration:</b> 45 Minutes</p>
<p>We’ll review your business and help you scale with proven systems, marketing, and automation.</p>
<p><b>Timezone:</b> Eastern Time</p>
</div>

<div class="right">

<h3>Select a Date</h3>
<input type="date" id="date">

<h3>Select a Time</h3>
<div class="slot-grid" id="slots"></div>

<div class="form" id="form">

<h3>Your Details</h3>

<form action="https://formspree.io/f/mzdkeegr" method="POST">

<input name="name" placeholder="Full Name" required>
<input name="business" placeholder="Business Name" required>
<input name="email" placeholder="Email Address" required>
<input name="phone" placeholder="Phone Number" required>

<input type="hidden" name="date" id="dateInput">
<input type="hidden" name="time" id="timeInput">

<button type="submit">Request Call</button>

</form>

</div>

</div>

</div>

<script>

let selectedTime=""

const times=[
"9:00 AM","9:45 AM","10:30 AM","11:15 AM",
"12:00 PM","12:45 PM","1:30 PM","2:15 PM",
"3:00 PM","3:45 PM","4:30 PM","5:15 PM"
]

const slots=document.getElementById("slots")

times.forEach(t=>{

let div=document.createElement("div")
div.className="slot"
div.innerText=t

div.onclick=()=>{
selectedTime=t
document.getElementById("form").style.display="block"
document.getElementById("timeInput").value=t
}

slots.appendChild(div)

})

document.getElementById("date").addEventListener("change", e=>{
document.getElementById("dateInput").value=e.target.value
})

</script>

</body>
</html>
