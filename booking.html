<!DOCTYPE html>
<html>
<head>
<title>Book a Call | HorizonBoost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
min-height:100vh;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background: radial-gradient(circle at 20% 30%, #2563eb, transparent 40%),
            radial-gradient(circle at 80% 70%, #9333ea, transparent 40%);
}

.navbar{
background:rgba(15,23,42,0.8);
padding:15px 30px;
display:flex;
justify-content:space-between;
backdrop-filter: blur(10px);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

.wrapper{
max-width:900px;
margin:60px auto;
background:white;
display:flex;
border-radius:12px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.left{
width:40%;
background:#0f172a;
color:white;
padding:40px;
}

.right{
width:60%;
padding:40px;
}

.slot-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:10px;
}

.slot{
border:1px solid #2563eb;
padding:12px;
text-align:center;
cursor:pointer;
border-radius:8px;
transition:0.3s;
}

.slot:hover{
background:#2563eb;
color:white;
}

.form{
display:none;
margin-top:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

@media(max-width:800px){
.wrapper{
flex-direction:column;
}
.left,.right{
width:100%;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="navbar">
  <div style="color:white;font-weight:bold;">HorizonBoost</div>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Book a Call</a>
    <a href="dev-dashboard.html">Dev</a>
  </div>
</div>

<div class="wrapper">

<div class="left">
<h2>HorizonBoost</h2>
<p>1:1 Strategy Call (45 min)</p>
<p>We help you scale your business with proven systems.</p>
</div>

<div class="right">

<h3>Select a Date</h3>
<input type="date" id="date">

<h3>Select a Time</h3>
<div class="slot-grid" id="slots"></div>

<div class="form" id="form">

<h3>Your Details</h3>

<form id="bookingForm" action="https://formspree.io/f/mzdkeegr" method="POST">

<input name="name" placeholder="Full Name" required>
<input name="business" placeholder="Business Name" required>
<input name="email" placeholder="Email Address" required>
<input name="phone" placeholder="Phone Number" required>

<input type="hidden" name="date" id="dateInput">
<input type="hidden" name="time" id="timeInput">

<button type="submit">Request Call</button>

</form>

</div>

</div>

</div>

<!-- ✅ FIREBASE SCRIPT (CORRECT VERSION) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsFshu5jFYa5rkdE9YBaRZSygBhN0rHXQ",
  authDomain: "horizonboost-536ed.firebaseapp.com",
  projectId: "horizonboost-536ed",
  storageBucket: "horizonboost-536ed.firebasestorage.app",
  messagingSenderId: "483833292439",
  appId: "1:483833292439:web:aa633917567ac651c9ebd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedTime = "";

const times = [
"9:00 AM","9:45 AM","10:30 AM","11:15 AM",
"12:00 PM","12:45 PM","1:30 PM","2:15 PM",
"3:00 PM","3:45 PM","4:30 PM","5:15 PM"
];

const slots = document.getElementById("slots");

// Load bookings
async function loadBookings(){

const date = document.getElementById("date").value;

const snapshot = await getDocs(collection(db, "bookings"));

let booked = [];

snapshot.forEach(doc=>{
let data = doc.data();
if(data.date === date){
booked.push(data.time);
}
});

slots.innerHTML = "";

times.forEach(t=>{

let div = document.createElement("div");
div.className = "slot";

if(booked.includes(t)){
div.innerText = t + " (Booked)";
div.style.background = "#ccc";
div.style.cursor = "not-allowed";
}else{
div.innerText = t;
div.onclick = ()=>{
selectedTime = t;
document.getElementById("form").style.display = "block";
document.getElementById("timeInput").value = t;
}
}

slots.appendChild(div);

});

}

// Date change
document.getElementById("date").addEventListener("change", ()=>{
document.getElementById("dateInput").value = document.getElementById("date").value;
loadBookings();
});

// Save booking
document.getElementById("bookingForm").addEventListener("submit", async (e)=>{

e.preventDefault(); // stop default form submit

const date = document.getElementById("date").value;

// 🚫 no time selected
if(!selectedTime){
alert("Please select a time first");
return;
}

// 🔍 check AGAIN before saving (prevents double booking)
const snapshot = await getDocs(collection(db, "bookings"));

let alreadyBooked = false;

snapshot.forEach(doc=>{
let data = doc.data();
if(data.date === date && data.time === selectedTime){
alreadyBooked = true;
}
});

if(alreadyBooked){
alert("This time is already booked. Please choose another.");
loadBookings(); // refresh UI
return;
}

document.getElementById("bookingForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const date = document.getElementById("date").value;

if(!selectedTime){
alert("Select a time");
return;
}

// check for double booking again
const snapshot = await getDocs(collection(db, "bookings"));

let taken = false;

snapshot.forEach(doc=>{
let data = doc.data();
if(data.date === date && data.time === selectedTime){
taken = true;
}
});

if(taken){
alert("Already booked");
return;
}

// save to firebase
await addDoc(collection(db, "bookings"), {
date: date,
time: selectedTime,
status: "Pending"
});

// 🔔 DISCORD WEBHOOK
await fetch(https://discord.com/api/webhooks/1499607403275096115/JFyjpmEmSBZejx1oq5va3ke7d1pgZ3_4ShtyDGKI-XjlIasl_XwrldOPin5iQI0Cfiyp, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
content: `🚀 New Booking!\n📅 ${date}\n⏰ ${selectedTime}`
})
});

// submit form (send email)
e.target.submit();

});
