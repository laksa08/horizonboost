<!DOCTYPE html>
<html>
<head>
<title>Dev Dashboard | HorizonBoost</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

.navbar{
padding:15px 30px;
background:#020617;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

.container{
max-width:1000px;
margin:40px auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

.status{
font-size:14px;
opacity:0.8;
}

</style>
</head>

<body>

<div class="navbar">
  <div>HorizonBoost Dev</div>
  <div>
    <a href="index.html">Home</a>
    <a href="booking.html">Booking</a>
  </div>
</div>

<div class="container">
<h2>Bookings</h2>
<div id="list"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsFshu5jFYa5rkdE9YBaRZSygBhN0rHXQ",
  authDomain: "horizonboost-536ed.firebaseapp.com",
  projectId: "horizonboost-536ed",
  storageBucket: "horizonboost-536ed.firebasestorage.app",
  messagingSenderId: "483833292439",
  appId: "1:483833292439:web:aa633917567ac651c9ebd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list = document.getElementById("list");

// 🔔 SOUND ALERT
const sound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

let firstLoad = true;

// 🔴 REAL-TIME LISTENER
onSnapshot(collection(db, "bookings"), (snapshot) => {

list.innerHTML = "";

snapshot.forEach(docSnap => {

const b = docSnap.data();

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div>
<strong>${b.date}</strong><br>
${b.time}<br>
<span class="status">${b.status || "Pending"}</span>
</div>

<button onclick="confirmBooking('${docSnap.id}')">Confirm</button>
`;

list.appendChild(card);

});

// 🔔 play sound when NEW booking comes in
if(!firstLoad){
sound.play();
alert("New booking received!");
}

firstLoad = false;

});

window.confirmBooking = async function(id){

const ref = doc(db, "bookings", id);

await updateDoc(ref, {status:"Booked"});

alert("Booking confirmed!");

}

</script>

</body>
</html>
